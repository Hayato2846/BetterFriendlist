name: Package and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Package and release
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Discord Notification
        # Announce only first-time stable or beta release tags.
        # Correction pushes still package and upload, but must not repost release notes.
        if: success() && github.event.created == true && github.event.forced != true && (!contains(github.ref_name, '-') || contains(github.ref_name, 'beta'))
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ github.ref_name }}
        shell: python
        run: |
          import os
          import json
          import urllib.request

          webhook_url = os.environ.get('DISCORD_WEBHOOK')
          if not webhook_url:
              print("Error: DISCORD_WEBHOOK secret is missing. Please add it to GitHub Secrets.")
              exit(1)

          version = os.environ.get('VERSION', 'Unknown')
          
          # Clean version string (remove 'v' prefix for the title)
          clean_version = version
          if version.startswith('v'):
              clean_version = version[1:]
          is_beta = "beta" in clean_version.lower()

          # Extract content from CHANGELOG.md
          changelog_body = ""
          try:
              if os.path.exists('CHANGELOG.md'):
                  with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
                      content = f.read()
                      
                      # Find start of current version section (e.g. "## [2.0.6]")
                      start_marker = f"## [{clean_version}]"
                      start_pos = content.find(start_marker)
                      
                      if start_pos != -1:
                          # Find end of this section (start of next section "## [" or end of file)
                          # Start searching after the marker to avoid finding the current one
                          end_pos = content.find("## [", start_pos + len(start_marker))
                          
                          if end_pos == -1:
                              section = content[start_pos:]
                          else:
                              section = content[start_pos:end_pos]
                              
                          # Remove the first line (header) and strip whitespace
                          lines = section.split('\n')
                          if len(lines) > 0:
                              changelog_body = '\n'.join(lines[1:]).strip()
                              print(f"Successfully extracted changelog for version {clean_version}")
                      else:
                          print(f"Version {clean_version} not found in CHANGELOG.md")
          except Exception as e:
              print(f"Error reading CHANGELOG.md: {e}")

          # Strip Markdown horizontal rules (---) that Discord renders as plain text
          if changelog_body:
              changelog_body = '\n'.join(
                  line for line in changelog_body.split('\n')
                  if line.strip() != '---'
              )

          # Use changelog body if found, otherwise fallback to release body
          fallback_body = "New beta version available for testing!" if is_beta else "New version released!"
          body = changelog_body.strip() if changelog_body else fallback_body

          # Define Project Links
          links = (
              "[CurseForge](https://www.curseforge.com/wow/addons/betterfriendlist/files) | "
              "[Wago](https://addons.wago.io/addons/betterfriendlist/version) | "
              "[WoWInterface](https://www.wowinterface.com/downloads/info26984-BetterFriendlist.html)"
          )

          # Truncate body if too long for Embed Description (Limit is 4096)
          # We leave some buffer for links and headers
          if len(body) > 3500:
              body = body[:3500] + "\n...(truncated)"

          beta_notice = ""
          if is_beta:
              beta_notice = (
                  "**Beta Version:** This is a preview build for testing before the next stable release. "
                  "Please report issues on Discord or GitHub.\n\n"
              )

          embed_title = (
              f"Beta Version {clean_version} available for testing!"
              if is_beta
              else f"Version {clean_version} released!"
          )
          embed_color = 5793266 if is_beta else 16766720 # Discord blurple for beta, gold for stable
          webhook_username = "BetterFriendlist Beta" if is_beta else "BetterFriendlist Release"
          footer_text = (
              "BetterFriendlist Beta - World of Warcraft Addon"
              if is_beta
              else "BetterFriendlist - World of Warcraft Addon"
          )

          # Construct JSON Payload with Embed
          payload = {
              "username": webhook_username,
              "avatar_url": "https://media.forgecdn.net/avatars/thumbnails/1514/711/64/64/638983629917728143.png",
              "embeds": [
                  {
                      "title": embed_title,
                      "description": f"{links}\n\n{beta_notice}{body}",
                      "color": embed_color,
                      "footer": {
                          "text": footer_text
                      }
                  }
              ]
          }

          # Send Request
          req = urllib.request.Request(webhook_url)
          req.add_header('Content-Type', 'application/json')
          req.add_header('User-Agent', 'GitHub-Action')

          try:
              response = urllib.request.urlopen(req, json.dumps(payload).encode('utf-8'))
              print(f"Notification sent successfully. Status Code: {response.status}")
          except Exception as e:
              print(f"Failed to send notification: {e}")
              exit(1)
