name: Review Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run BetterFriendlist review checks
        shell: pwsh
        run: |
          $baseRef = ""
          if ("${{ github.event_name }}" -eq "pull_request") {
            $baseRef = "origin/${{ github.base_ref }}"
          }
          ./tools/BFL-ReviewCheck.ps1 -BaseRef $baseRef
